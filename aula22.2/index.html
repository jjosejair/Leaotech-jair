<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 22 - Cadastro Automático</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #e9ecef; }
        .card { border-radius: 15px; border: none; }
        .destaque { color: #0d6efd; font-weight: bold; }
    </style>
</head>

<body style="margin-bottom: 100px;">
    <div class="container mt-5">
        <div class="card shadow p-4">
            <h1 class="text-center mb-4"> Cadastro</h1>
            <p class="text-center text-muted">Basta digitar os 8 números do CEP!</p>

            <div class="row g-3">
                <div class="col-md-6">
                    <label>Nome:</label>
                    <input type="text" class="form-control" id="nome">
                </div>
                <div class="col-md-6">
                    <label>Idade:</label>
                    <input type="number" class="form-control" id="idade">
                </div>

                <div class="col-md-4">
                    <label class="destaque">CEP:</label>
                    <input type="text" class="form-control" id="cep" maxlength="9" placeholder="00000-000">
                </div>
                <div class="col-md-8">
                    <label>Rua:</label>
                    <input type="text" class="form-control" id="rua">
                </div>

                <div class="col-md-12">
                    <label>Complemento:</label>
                    <input type="text" class="form-control" id="complemento">
                </div>

                <div class="col-md-5">
                    <label>Cidade:</label>
                    <input type="text" class="form-control" id="cidade">
                </div>
                <div class="col-md-3">
                    <label>Estado:</label>
                    <input type="text" class="form-control" id="estado">
                </div>
                <div class="col-md-4">
                    <label>Região:</label>
                    <input type="text" class="form-control" id="regiao">
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputCep = document.querySelector('#cep');
        
        inputCep.addEventListener('input', function() {
        
            this.value = this.value.replace(/\D/g, '')

            if (cep.length === 8) {
                
                fetch(`https://viacep.com.br/ws/${cep}/json/`)
                    .then(res => res.json())
                    .then(dados => {
                        if (!dados.erro) {
                            document.querySelector('#rua').value = dados.logradouro;
                            document.querySelector('#cidade').value = dados.localidade;
                            document.querySelector('#estado').value = dados.uf;
                            document.querySelector('#complemento').value = dados.complemento;
                            document.querySelector('#regiao').value = dados.regiao;
                            
                        
                            console.log("Endereço encontrado!");
                        }
                    })
                    .catch(e => console.error("Erro na busca automática."));
            }
        });
    </script>
</body>
</html>
