<style>
    .caixa{
        width: 100px;
        height: 100px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-right: 5px;
    }
    .arredondado{
        border-radius: 20px;

<body style="margin-bottom: 500px;">
   <h1>Alterando atributos e estilos no elementos </h1> 
   <button onclick="mudarDeCor()" class="btn btn-info mb-2">Mudar de cor</button>

   <div class="d-flex">
    <div id="caixa1" class="caixa bg-success">
            Caixa 1
    </div>
    <div id="caixa2" class="caixa bg-danger ">
        Caixa 2
   </div>
   </div>
   
   
</body>

<script>
function mudarDeCor(){
    let caixa = document.getElementById('caixa1')
    // console.log(caixa.classList.remove('d-none'))
    // caixa.classList.add('arredondado')
    // caixa.classList.toggle('d-none')
}

let caixa2 = document.getElementById('caixa2')

/*
'click'        // clique
'dblclick'     // clique duplo
'mousedown'    // botão pressionado
'mouseup'      // botão solto
'mousemove'    // mover mouse
'mouseenter'   // entrou no elemento
'mouseleave'   // saiu do elemento
'mouseover'    // passou por cima
'mouseout'     // saiu de cima
'contextmenu'  // clique direito

'keydown'      // tecla pressionada
'keyup'         // tecla solta
'keypress'      // tecla digitada (menos usado)

'submit'        // envio formulário
'change'        // valor alterado
'input'         // digitando
'focus'         // ganhou foco
'blur'          // perdeu foco
'reset'         // reset formulário

'load'          // página carregou
'resize'        // redimensionou janela
'scroll'        // scroll da página
'beforeunload'  // antes de sair da página
*/

caixa2.addEventListener('click',() => {
    caixa2.classList.remove('bg-danger')
    caixa2.classList.add('bg-warning')
})

let btn2 = document.getElementById("btn2")
btn2.addEventListener("click ", () => {
    let caixa3 = document.createElement("div")
    caixa3.classList.add("caixa" , "bg-warning")
    caixa3.innerHTML = "caixa 3"
    
})



</script>
