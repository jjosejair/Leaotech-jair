<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Consulta CEP</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

  <div class="container">
    <h2>Consultar CEP</h2>

    <input 
      type="text" 
      id="cep" 
      class="form-control w-25" 
      placeholder="Digite o CEP"
    >

    <button onclick="buscarCep()" class="btn btn-primary mt-2">
      Buscar
    </button>

    <div id="resultado" class="mt-3"></div>
  </div>

<script>
function buscarCep(){
  const cep = document.getElementById('cep').value
  const resultado = document.getElementById('resultado')

  if(cep == ""){
    resultado.innerHTML = "<div class='alert alert-danger'>Digite um CEP</div>"
    return
  }

  // chamada da API
  fetch(`https://viacep.com.br/ws/${cep}/json/`)
    .then(response => response.json())
    .then(dados => {

      if(dados.erro){
        resultado.innerHTML = "<div class='alert alert-danger'>CEP não encontrado</div>"
      } else {
        resultado.innerHTML = `
          <div class="alert alert-success">
            <strong>Rua:</strong> ${dados.logradouro} <br>
            <strong>Bairro:</strong> ${dados.bairro} <br>
            <strong>Cidade:</strong> ${dados.localidade} <br>
            <strong>Estado:</strong> ${dados.uf}
          </div>
        `
      }

    })
    .catch(() => {
      resultado.innerHTML = "<div class='alert alert-danger'>Erro ao buscar CEP</div>"
    })
}
</script>

</body>
</html>
