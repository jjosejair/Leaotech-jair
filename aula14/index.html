// 2. Caixa eletrônico (menu até sair)

function caixaEletronico() {
  let saldo = 1000;
  let opcao = 0;

  while (opcao !== 4) {
    opcao = Number(prompt(
      "1 - Saldo\n2 - Sacar\n3 - Depositar\n4 - Sair"
    ));

    switch (opcao) {
      case 1:
        console.log(`Saldo: R$ ${saldo}`);
        break;

      case 2:
        let saque = Number(prompt("Valor do saque:"));

        if (saque > 0 && saque <= saldo) {
          saldo -= saque;
          console.log(`Saque realizado. Novo saldo: R$ ${saldo}`);
        } else {
          console.log("Saldo insuficiente ou valor inválido");
        }
        break;

      case 3:
        let deposito = Number(prompt("Valor do depósito:"));

        if (deposito > 0) {
          saldo += deposito;
          console.log(`Depósito realizado. Novo saldo: R$ ${saldo}`);
        } else {
          console.log("Valor inválido");
        }
        break;

      case 4:
        console.log("Saindo...");
        break;

      default:
        console.log("Opção inválida");
    }
  }
}

caixaEletronico();

function validarNumero() {
  let numero = Number(prompt("Digite um número entre 1 e 10:"));

  while (numero < 1 || numero > 10) {
    numero = Number(prompt("Valor inválido. Digite novamente:"));
  }

  console.log("Número válido:", numero);
}

// 2. Sistema de menu com operações



function calculadora() {
  let opcao;

  do {
    opcao = Number(prompt(
      "1 - Somar\n2 - Subtrair\n3 - Sair"
    ));

    switch (opcao) {
      case 1:
        let num1 = Number(prompt("Digite o primeiro número:"));
        let num2 = Number(prompt("Digite o segundo número:"));
        console.log("Resultado:", num1 + num2);
        break;

      case 2:
        let num3 = Number(prompt("Digite o primeiro número:"));
        let num4 = Number(prompt("Digite o segundo número:"));
        console.log("Resultado:", num3 - num4);
        break;

      case 3:
        console.log("Saindo...");
        break;

      default:
        console.log("Opção inválida");
    }

  } while (opcao !== 3);
}

calculadora();
