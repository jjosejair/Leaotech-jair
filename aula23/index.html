<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Mágica do Fetch</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { 
            background-color: #ffde59; 
            font-family: 'Comic Sans MS', sans-serif; 
        }
        
        .cartao-produto { 
            border-radius: 20px; 
            border: none; 
        }
    
        img { 
            height: 150px; 
            object-fit: contain; 
        }
    </style>
</head>

<body>

<div class="container py-5 text-center">
    <h1 class="display-5 mb-4 text-dark">Qual presente você quer ver?</h1>
    
    <div class="row justify-content-center">
        <div class="col-8 col-md-4">
            <input 
                type="number" 
                id="numeroProduto" 
                class="form-control form-control-lg mb-3 shadow" 
                placeholder="Digite de 1 a 20">
            
            <button onclick="buscarComFetch()" class="btn btn-primary btn-lg w-100 shadow">
                Buscar Agora!
            </button>
        </div>
    </div>

    <div id="vitrine" class="mt-5 d-flex justify-content-center"></div>
</div>

<script>
    function buscarComFetch() {
        const caixinha = document.getElementById('numeroProduto');
        const numero = Number(caixinha.value);
        const vitrine = document.getElementById('vitrine');

        if (isNaN(numero) || numero < 1 || numero > 20) {
            alert("Digite um número válido entre 1 e 20!");
            return;
        }

        vitrine.innerHTML = "<h4>O robô está correndo para buscar o item " + numero + "</h4>";

        fetch(`https://fakestoreapi.com/products/${numero}`)
            .then(resposta => resposta.json())
            .then(produto => {

                caixinha.value = "";

                vitrine.innerHTML = `
                    <div class="card cartao-produto p-4 shadow-lg" style="width: 18rem;">
                        <img src="${produto.image}" class="card-img-top" alt="Produto">
                        <div class="card-body text-dark">
                            <h5 class="card-title">${produto.title}</h5>
                            <p class="text-success fw-bold fs-4">$ ${produto.price}</p>
                            <p class="text-muted small">${produto.description.substring(0, 60)}...</p>
                        </div>
                    </div>
                `;
            })
            .catch(() => {
                vitrine.innerHTML = "<h4>Ih! O robô não achou esse número. Tente de 1 a 20!</h4>";
                caixinha.value = "";
            });
    }
</script>

</body>
</html>
