<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Leão Tech</title>
  </head>
  <body>
    <main class="container">
      
      <img
        class="logo"
        src="img/Fortaleza_Esporte_Clube_logo.png"
        alt="Logo Fortaleza"
      />

      
      <h1>Leão Tech</h1>

      
      <p class="descricao">
        O Leão Tech é um curso voltado para o desenvolvimento de habilidades em
        tecnologia, incentivando os alunos a aprender HTML, CSS e JavaScript de
        forma prática.
      </p>

    
      <img class="imagem-tech" src="/trabalho/img/images.png" alt="Leão Tech" />

    
      <section class="informacoes">
        <div class="caixa">
          <h2>Tema</h2>
          <p>Desenvolvimento Web</p>
        </div>

        <div class="caixa">
          <h2>Público</h2>
          <p>Alunos do Leão Tech</p>
        </div>

        <div class="caixa">
          
          <h2>Foco</h2>
          <p>HTML, CSS e JavaScript</p>
        </div>
      </section>
    </main>
  </body>
</html>
