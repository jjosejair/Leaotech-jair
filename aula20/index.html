<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Usuários</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow">

    <h3 class="text-center mb-3">Cadastro de Usuários</h3>

    <!-- Inputs -->
    <input type="text" id="nome" class="form-control mb-2" placeholder="Nome">
    <input type="number" id="idade" class="form-control mb-2" placeholder="Idade">
    <input type="text" id="cidade" class="form-control mb-2" placeholder="Cidade">
    <input type="text" id="profissao" class="form-control mb-3" placeholder="Profissão">

    <!-- Botões -->
    <button id="btnCadastrar" class="btn btn-success mb-2">Cadastrar</button>
    <button id="btnListar" class="btn btn-primary mb-3">Mostrar Lista</button>

    
    <div id="lista"></div>

  </div>
</div>

<script>

  
  let nome = document.getElementById("nome");
  let idade = document.getElementById("idade");
  let cidade = document.getElementById("cidade");
  let profissao = document.getElementById("profissao");
  let lista = document.getElementById("lista");

  let btnCadastrar = document.getElementById("btnCadastrar");
  let btnListar = document.getElementById("btnListar");

  
  let usuarios = [];

  
  function cadastrar() {

    
    if (nome.value === "" || idade.value === "" || cidade.value === "" || profissao.value === "") {
      alert("Preencha todos os campos!");
      return;
    }

    
    let usuario = {
      nome: nome.value,
      idade: idade.value,
      cidade: cidade.value,
      profissao: profissao.value
    };

    
    usuarios.push(usuario);


    nome.value = "";
    idade.value = "";
    cidade.value = "";
    profissao.value = "";

    alert("Usuário cadastrado!");
  }

  
  function listar() {

    lista.innerHTML = "<h4>Usuários cadastrados:</h4>";

    usuarios.forEach(function(u, index) {
      lista.innerHTML += `
        <div class="card p-2 mb-2">
          <strong>${index + 1}. ${u.nome}</strong><br>
          Idade: ${u.idade}<br>
          Cidade: ${u.cidade}<br>
          Profissão: ${u.profissao}
        </div>
      `;
    });


    if (usuarios.length === 0) {
      lista.innerHTML = "<p class='text-danger'>Nenhum usuário cadastrado.</p>";
    }
  }

  
  btnCadastrar.addEventListener("click", cadastrar);
  btnListar.addEventListener("click", listar);

</script>

</body>
</html>
